name: Score
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Test source-derived ports
        run: |
          npm test
          npm run check:objects

      - name: Score development sessions
        run: |
          node scripts/score-development.mjs \
            2>score-stderr.txt | tee score-stdout.txt
          cat score-stderr.txt >&2

      - name: Extract score summary
        run: |
          node <<'EOF'
            const fs = require('fs');
            const raw = fs.readFileSync('score-stdout.txt', 'utf8');
            const idx = raw.lastIndexOf('__RESULTS_JSON__');
            if (idx < 0) { console.log('No results found'); process.exit(1); }
            const data = JSON.parse(raw.slice(idx + '__RESULTS_JSON__'.length).trim());
            const results = data.results || [];
            const passed = results.filter(r => r.passed).length;
            const replayErrors = results.filter(r => r.error).length;
            const total = results.length;
            const sumMetric = key => results.reduce((sum, result) => ({
              matched: sum.matched + (result.metrics?.[key]?.matched || 0),
              total: sum.total + (result.metrics?.[key]?.total || 0),
            }), { matched: 0, total: 0 });
            const percentage = metric => metric.total
              ? (100 * metric.matched / metric.total).toFixed(1) + '%'
              : '0.0%';
            const format = value => value.toLocaleString('en-US');
            const rng = sumMetric('rngCalls');
            const cells = sumMetric('cellsOnly');
            const screens = sumMetric('screens');
            const cursors = sumMetric('cursors');
            const animation = sumMetric('animFrames');
            const cursorCausedMisses = cells.matched - screens.matched;
            const metricLine = (label, metric) =>
              label + ': ' + format(metric.matched) + ' / ' + format(metric.total)
                + ' (' + percentage(metric) + ')';
            const display = [
              'Sessions: ' + passed + ' / ' + total + ' passing',
              'Replay errors: ' + replayErrors,
              metricLine('RNG', rng),
              metricLine('Cells', cells),
              metricLine('Cursors', cursors),
              metricLine('Screens', screens),
              'Cursor-caused misses: ' + format(cursorCausedMisses),
            ];
            if (animation.total) {
              display.push(metricLine('Animation frames', animation));
            }
            console.log(display.join('\n'));

            const summary = {
              passed,
              total,
              replayErrors,
              rngPct: percentage(rng).slice(0, -1),
              timestamp: data.timestamp,
              metrics: {
                rngCalls: rng,
                cellsOnly: cells,
                cursors,
                screens,
                animFrames: animation,
              },
              diagnostics: { cursorCausedMisses },
              results: results.map(r => ({
                session: r.session,
                passed: r.passed,
                error: r.error,
                rng: r.metrics?.rngCalls,
                cells: r.metrics?.cellsOnly,
                screen: r.metrics?.screens,
                cursor: r.metrics?.cursors,
                animation: r.metrics?.animFrames,
              })),
            };
            fs.writeFileSync('score-summary.json', JSON.stringify(summary, null, 2));

            if (process.env.GITHUB_STEP_SUMMARY) {
              fs.appendFileSync(
                process.env.GITHUB_STEP_SUMMARY,
                [
                  '## Development score',
                  '',
                  ...display.map(line => '- ' + line),
                ].join('\n') + '\n',
              );
            }
          EOF

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: score-results
          path: |
            score-summary.json
            score-stdout.txt
